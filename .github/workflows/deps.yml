name: DEPS # update dependencies

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Update Gradle wrapper
        id: gradle-wrapper
        run: |
          CURRENT_GRADLE=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          LATEST_GRADLE=$(curl -s https://services.gradle.org/versions/current | jq -r '.version')
          if [ "$CURRENT_GRADLE" != "$LATEST_GRADLE" ]; then
            ./gradlew wrapper --gradle-version="$LATEST_GRADLE"
            echo "updated=- gradle wrapper: $CURRENT_GRADLE -> $LATEST_GRADLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Gradle dependencies
        id: gradle-deps
        run: |
          ./gradlew dependencyUpdates

          UPDATES=""
          jq -c '.outdated.dependencies[]' build/dependencyUpdates/report.json | while read -r dep; do
            group=$(echo "$dep" | jq -r '.group')
            name=$(echo "$dep" | jq -r '.name')
            current=$(echo "$dep" | jq -r '.version')
            new=$(echo "$dep" | jq -r '.available.release // .available.milestone // empty')

            if [ -n "$new" ]; then
              echo "Updating $group:$name from $current to $new"

              if [[ "$name" == *.gradle.plugin ]]; then
                sed -i "s|id '${group}' version '${current}'|id '${group}' version '${new}'|g" build.gradle
                echo "- ${group} plugin: ${current} -> ${new}" >> /tmp/gradle-updates.txt
              else
                sed -i "s|${group}:${name}:${current}|${group}:${name}:${new}|g" build.gradle

                if [ "$name" = "spring-ai-bom" ]; then
                  sed -i "s|set('springAiVersion', \"${current}\")|set('springAiVersion', \"${new}\")|g" build.gradle
                fi

                echo "- ${group}:${name}: ${current} -> ${new}" >> /tmp/gradle-updates.txt
              fi
            fi
          done

          if [ -f /tmp/gradle-updates.txt ]; then
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "updated<<$EOF" >> "$GITHUB_OUTPUT"
            cat /tmp/gradle-updates.txt >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

          ./gradlew --stop

      - name: Update frontend dependencies
        id: frontend-deps
        run: |
          BEFORE=$(jq -r '.devDependencies | to_entries[] | "\(.key):\(.value)"' package.json)
          bun update
          AFTER=$(jq -r '.devDependencies | to_entries[] | "\(.key):\(.value)"' package.json)
          if [ "$BEFORE" != "$AFTER" ]; then
            DIFF=$(diff <(echo "$BEFORE") <(echo "$AFTER") | grep '^[<>]' | sed 's/^< /old: /;s/^> /new: /' || true)
            echo "updated=- frontend dependencies" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew assemble --stacktrace --build-cache

      - name: Test
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew test --stacktrace --build-cache

      - name: Cache Playwright browsers
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.changes.outputs.has_changes == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./gradlew --stop && bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.changes.outputs.has_changes == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install-deps chromium

      - name: E2E Test
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew testE2e --stacktrace --build-cache

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BODY=""
          if [ -n "${{ steps.gradle-wrapper.outputs.updated }}" ]; then
            BODY="${BODY}${{ steps.gradle-wrapper.outputs.updated }}"$'\n'
          fi
          if [ -n "${{ steps.gradle-deps.outputs.updated }}" ]; then
            BODY="${BODY}${{ steps.gradle-deps.outputs.updated }}"$'\n'
          fi
          if [ -n "${{ steps.frontend-deps.outputs.updated }}" ]; then
            BODY="${BODY}${{ steps.frontend-deps.outputs.updated }}"$'\n'
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update dependencies" -m "$BODY"
          git push