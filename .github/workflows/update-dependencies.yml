name: Update Dependencies

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Update Gradle wrapper
        run: |
          LATEST_GRADLE=$(curl -s https://services.gradle.org/versions/current | jq -r '.version')
          echo "Updating Gradle wrapper to $LATEST_GRADLE"
          ./gradlew wrapper --gradle-version="$LATEST_GRADLE"

      - name: Update Gradle dependencies
        run: |
          ./gradlew useLatestVersions
          ./gradlew --stop

      - name: Update frontend dependencies
        run: bun update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew assemble --stacktrace --build-cache

      - name: Test
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew test --stacktrace --build-cache

      - name: Cache Playwright browsers
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.changes.outputs.has_changes == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./gradlew --stop && bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.changes.outputs.has_changes == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install-deps chromium

      - name: E2E Test
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew testE2e --stacktrace --build-cache

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update dependencies"
          git push