server:
  port: 8080

spring:
  application:
    name: varun.surf
    version: ${version}
  ai:
    openai:
      api-key: YOUR_API_KEY
      chat:
        options:
          model: gpt-4o-mini
    mcp:
      server:
        enabled: true
        name: varun-surf
        version: ${version}
        type: ASYNC
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
        instructions: >-
          MCP server for varun.surf - kitesurfing weather forecasts and live wind conditions.
          Use the provided tools to look up kite spots, check current wind, and read
          daily/hourly forecasts. Spot identifiers are integer Windguru IDs (wgId).

management:
  endpoints:
    web:
      exposure:
         include: health,metrics,prometheus
      base-path: /actuator
  endpoint:
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: varun.surf

app:
  feature:
    ai:
      forecast:
        analysis:
          enabled: false
    icm:
      vision:
        enabled: false
  analytics:
    password: "\${ANALYTICS_PASSWORD:}"
  session:
    max-age-seconds: 86400
